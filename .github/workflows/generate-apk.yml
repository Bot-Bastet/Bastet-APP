name: Generate Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPO_PUBLIC_GATEWAY_IP: ha.arthonetwork.fr
  EXPO_PUBLIC_GATEWAY_PORT: "44888"
  EXPO_PUBLIC_USE_SSL: "true"

jobs:
  # ===========================================================================
  # 1. Détection de Duplication de Code (jscpd)
  # ===========================================================================
  duplication:
    name: Code Duplication (jscpd)
    runs-on: ubuntu-latest
    outputs:
      percentage: ${{ steps.parse.outputs.percentage }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"

      - name: Install jscpd
        run: npm install -g jscpd

      - name: Analyse des duplications
        run: |
          jscpd src \
            --threshold 10 \
            --min-lines 5 \
            --min-tokens 50 \
            --reporters "console" > jscpd_output.txt 2>&1 || true

      - name: Parse and validate duplication
        id: parse
        run: |
          python -c "
          import re, os
          with open('jscpd_output.txt') as f:
              text = f.read()
          match = re.search(r'(\d+\.?\d*)\s*%', text)
          val = float(match.group(1)) if match else 0.0
          percentage = f'{val}%'
          print(f'Duplication détectée: {percentage}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'percentage={percentage}\n')
          if val > 10.0:
              print('Error: La duplication de code dépasse le seuil maximal autorisé de 10% !')
              exit(1)
          "

  # ===========================================================================
  # 2. Analyse de Sécurité SAST (Semgrep)
  # ===========================================================================
  security:
    name: SAST Security Scan (Semgrep)
    runs-on: ubuntu-latest
    outputs:
      findings_count: ${{ steps.parse.outputs.findings_count }}
    container:
      image: semgrep/semgrep:1.114.0
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Scan Semgrep
        env:
          SEMGREP_SEND_METRICS: "off"
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --exclude node_modules \
            --exclude android \
            --exclude .expo \
            --exclude spotmicro_3d \
            --json \
            --output semgrep_results.json \
            src

      - name: Parse and validate security findings
        id: parse
        run: |
          python -c "
          import json, os
          with open('semgrep_results.json') as f:
              data = json.load(f)
          count = len(data.get('results', []))
          print(f'Failles de sécurité trouvées: {count}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'findings_count={count}\n')
          if count > 0:
              print('Error: Faille de sécurité détectée par Semgrep. Release bloquée !')
              exit(1)
          "

  # ===========================================================================
  # 3. Scan de Vulnérabilités & Secrets (Trivy)
  # ===========================================================================
  vulnerability:
    name: Vuln & Secrets Scan (Trivy)
    runs-on: ubuntu-latest
    outputs:
      issues_count: ${{ steps.parse.outputs.issues_count }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Scan Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,secret"
          severity: "HIGH,CRITICAL"
          format: "json"
          output: "trivy_results.json"

      - name: Parse and validate Trivy findings
        id: parse
        run: |
          python -c "
          import json, os
          with open('trivy_results.json') as f:
              data = json.load(f)
          results = data.get('Results', [])
          issues = 0
          for r in results:
              issues += len(r.get('Vulnerabilities', [])) + len(r.get('Secrets', []))
          print(f'Vulnérabilités ou secrets critiques trouvés: {issues}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'issues_count={issues}\n')
          if issues > 0:
              print('Error: Vulnérabilités/secrets de sévérité HIGH/CRITICAL détectés par Trivy. Release bloquée !')
              exit(1)
          "

  # ===========================================================================
  # 4. Compilation Android APK & Release
  # ===========================================================================
  build:
    name: Build Android APK
    needs: [duplication, security, vulnerability]
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_DEV_TOKEN: ${{ secrets.API_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Verify Expo dependencies
        run: npx expo install --check -- --legacy-peer-deps

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install --clean

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Resolve release label
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "label=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "label=v${VERSION}-build${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect APK
        env:
          RELEASE_LABEL: ${{ steps.version.outputs.label }}
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/release/app-release.apk "build-output/Bastet-${RELEASE_LABEL}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: Bastet-APK-${{ steps.version.outputs.label }}
          path: build-output/Bastet-${{ steps.version.outputs.label }}.apk

      - name: Generate Release Body
        run: |
          cat << 'EOF' > release_body.md
          Application Android pour le projet Bastet.

          ### Configuration Gateway (API v2)
          - Hôte : `ha.arthonetwork.fr`
          - Port API : `44888` (HTTPS)
          - Ports vidéo : HLS `48888`, WebRTC `48889`

          ### 📊 Rapport de Qualité & Sécurité (Quality Gate)
          | Test | Statut | Métrique | Limite |
          | :--- | :---: | :---: | :---: |
          | 📏 Duplication de code (jscpd) | ✅ Conforme | ${{ needs.duplication.outputs.percentage }} | <= 10% |
          | 🛡️ Failles de sécurité (Semgrep) | ✅ Conforme | ${{ needs.security.outputs.findings_count }} faille | 0 |
          | 🔐 Vulnérabilités & Secrets (Trivy) | ✅ Conforme | ${{ needs.vulnerability.outputs.issues_count }} vuln/secret | 0 |
          EOF

      - name: Create Release and Upload Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: build-output/Bastet-${{ steps.version.outputs.label }}.apk
          body_path: release_body.md
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
