name: Generate Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install --clean

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/debug/app-debug.apk build-output/Bastet-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bastet-APK-${{ github.ref_name }}
          path: build-output/Bastet-${{ github.ref_name }}.apk

      - name: Create Release and Upload Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build-output/Bastet-${{ github.ref_name }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
