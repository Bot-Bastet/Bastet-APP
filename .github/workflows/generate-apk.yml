name: Generate Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPO_PUBLIC_GATEWAY_IP: ha.arthonetwork.fr
  EXPO_PUBLIC_GATEWAY_PORT: "44888"
  EXPO_PUBLIC_USE_SSL: "true"

jobs:
  # ===========================================================================
  # 1. Quality Gates
  # ===========================================================================
  duplication:
    name: Code Duplication (jscpd)
    runs-on: ubuntu-latest
    outputs:
      percentage: ${{ steps.parse.outputs.percentage }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install jscpd
        run: npm install -g jscpd

      - name: Analyse des duplications
        run: |
          jscpd src \
            --threshold 10 \
            --min-lines 5 \
            --min-tokens 50 \
            --reporters "console" > jscpd_output.txt 2>&1 || true

      - name: Parse and validate
        id: parse
        run: |
          python3 -c "
          import re, os
          with open('jscpd_output.txt') as f:
              text = f.read()
          match = re.search(r'(\d+\.?\d*)\s*%', text)
          val = float(match.group(1)) if match else 0.0
          percentage = f'{val}%'
          print(f'Duplication: {percentage}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'percentage={percentage}\n')
          if val > 10.0:
              print('Error: Duplication > 10%')
              exit(1)
          "

  security:
    name: SAST Security Scan (Semgrep)
    runs-on: ubuntu-latest
    outputs:
      findings_count: ${{ steps.parse.outputs.findings_count }}
    container:
      image: semgrep/semgrep:1.114.0
    steps:
      - uses: actions/checkout@v4

      - name: Scan Semgrep
        env:
          SEMGREP_SEND_METRICS: "off"
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --exclude node_modules \
            --exclude android \
            --exclude .expo \
            --exclude spotmicro_3d \
            --json \
            --output semgrep_results.json \
            src

      - name: Parse findings
        id: parse
        run: |
          python3 -c "
          import json, os
          with open('semgrep_results.json') as f:
              data = json.load(f)
          count = len(data.get('results', []))
          print(f'Failles: {count}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'findings_count={count}\n')
          if count > 0:
              print('Error: Failles de sécurité détectées')
              exit(1)
          "

  # ===========================================================================
  # 2. Build Android APK
  # ===========================================================================
  build:
    name: Build Android APK
    needs: [duplication, security]
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_DEV_TOKEN: ${{ secrets.API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install --clean

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -alias bastet \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore android/app/bastet-debug.keystore \
            -storepass bastet123 \
            -keypass bastet123 \
            -dname "CN=Bastet, OU=Dev, O=Bastet, L=Paris, ST=IDF, C=FR"

      - name: Configure signing
        run: |
          cat > android/key.properties << 'EOF'
          storePassword=bastet123
          keyPassword=bastet123
          keyAlias=bastet
          storeFile=bastet-debug.keystore
          EOF

          # Update build.gradle to use key.properties
          sed -i 's|signingConfigs {.*|signingConfigs {\n        debug {\n            storeFile file("bastet-debug.keystore")\n            storePassword "bastet123"\n            keyAlias "bastet"\n            keyPassword "bastet123"\n        }\n        release {\n            storeFile file("bastet-debug.keystore")\n            storePassword "bastet123"\n            keyAlias "bastet"\n            keyPassword "bastet123"\n        }|' android/app/build.gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK (debug-signed)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Resolve version label
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "label=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "label=v${VERSION}-build${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect APK
        env:
          RELEASE_LABEL: ${{ steps.version.outputs.label }}
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/debug/app-debug.apk "build-output/Bastet-${RELEASE_LABEL}.apk"
          ls -lh build-output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bastet-APK-${{ steps.version.outputs.label }}
          path: build-output/Bastet-${{ steps.version.outputs.label }}.apk

      - name: Attach APK to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build-output/Bastet-${{ steps.version.outputs.label }}.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
